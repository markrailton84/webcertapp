{% extends "base.html" %}
{% block title %}{{ action }} User — CertManager{% endblock %}
{% block content %}

<div class="mb-4">
  <a href="{{ url_for('auth.users') }}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i>Users</a>
  <h4 class="mb-0 mt-1"><i class="bi bi-person-plus me-2"></i>{{ action }} User</h4>
</div>

<div class="card shadow-sm" style="max-width:400px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Username <span class="text-danger">*</span></label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email <span class="text-danger">*</span></label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password <span class="text-danger">*</span></label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Role</label>
        <select name="role" class="form-select">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ action }} User</button>
        <a href="{{ url_for('auth.users') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
