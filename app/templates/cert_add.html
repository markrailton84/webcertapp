{% extends "base.html" %}
{% block title %}Add Certificate — CertManager{% endblock %}
{% block content %}

<div class="mb-4">
  <a href="{{ url_for('certs.dashboard') }}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i>Dashboard</a>
  <h4 class="mb-0 mt-1"><i class="bi bi-plus-circle me-2"></i>Add Certificate Manually</h4>
</div>

<div class="card shadow-sm" style="max-width:700px">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label">Common Name <span class="text-danger">*</span></label>
          <input type="text" name="common_name" class="form-control" placeholder="e.g. *.example.com" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Hostname / System</label>
          <input type="text" name="hostname" class="form-control" placeholder="e.g. webserver01">
        </div>
        <div class="col-md-6">
          <label class="form-label">Expiry Date (Valid To) <span class="text-danger">*</span></label>
          <input type="date" name="not_after" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Valid From</label>
          <input type="date" name="not_before" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Issuer</label>
          <input type="text" name="issuer" class="form-control" placeholder="e.g. DigiCert Inc">
        </div>
        <div class="col-12">
          <label class="form-label">Subject</label>
          <input type="text" name="subject" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Serial Number</label>
          <input type="text" name="serial_number" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Thumbprint (SHA256)</label>
          <input type="text" name="thumbprint" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">SANs <small class="text-muted">(one per line, e.g. DNS:example.com)</small></label>
          <textarea name="sans" class="form-control" rows="3" placeholder="DNS:example.com&#10;DNS:www.example.com&#10;IP:192.168.1.1"></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Tags <small class="text-muted">(comma-separated)</small></label>
          <input type="text" name="tags" class="form-control" placeholder="prod, web, nginx">
        </div>
        <div class="col-md-6">
          <label class="form-label">Notes</label>
          <input type="text" name="notes" class="form-control">
        </div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save Certificate</button>
        <a href="{{ url_for('certs.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
