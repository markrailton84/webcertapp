{% extends "base.html" %}
{% block title %}{{ action }} User — My Cert Manager{% endblock %}
{% block content %}

<div class="mb-4">
  <a href="{{ url_for('auth.users') }}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i>Users</a>
  <h4 class="mb-0 mt-1"><i class="bi bi-person-plus me-2"></i>{{ action }} User</h4>
</div>

<div class="card shadow-sm" style="max-width:500px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Username <span class="text-danger">*</span></label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email <span class="text-danger">*</span></label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password <span class="text-danger">*</span></label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Role</label>
        <select name="role" class="form-select" id="roleSelect">
          <option value="user">User</option>
          <option value="global_admin">Global Admin</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <hr>
      <div id="teamSection">
        <h6 class="mb-3"><i class="bi bi-people me-1"></i>Team Membership <span id="teamRequired"><span class="text-danger">*</span></span></h6>
        {% if teams %}
        <div class="mb-3">
          <label class="form-label">Team</label>
          <select name="team_id" class="form-select" id="teamSelect">
            <option value="">— select a team —</option>
            {% for team in teams %}
            <option value="{{ team.id }}">{{ team.name }}</option>
            {% endfor %}
          </select>
          <div class="form-text" id="teamHint">Required for User role.</div>
        </div>
        <div class="mb-3" id="permissionsBlock">
          <label class="form-label">Permissions</label>
          <div class="d-flex flex-wrap gap-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="can_view" id="can_view" checked>
              <label class="form-check-label" for="can_view">View</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="can_add" id="can_add">
              <label class="form-check-label" for="can_add">Add</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="can_edit" id="can_edit">
              <label class="form-check-label" for="can_edit">Edit</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="can_delete" id="can_delete">
              <label class="form-check-label" for="can_delete">Delete</label>
            </div>
          </div>
        </div>
        {% else %}
        <div class="alert alert-warning">No teams exist yet. <a href="{{ url_for('teams.team_new') }}">Create a team</a> before adding users.</div>
        {% endif %}
      </div>
      <script>
        function updateTeamSection() {
          var role = document.getElementById('roleSelect').value;
          var isPrivileged = (role === 'admin' || role === 'global_admin');
          var teamSelect = document.getElementById('teamSelect');
          var hint = document.getElementById('teamHint');
          var reqMark = document.getElementById('teamRequired');
          if (teamSelect) {
            if (isPrivileged) {
              teamSelect.removeAttribute('required');
              if (hint) hint.textContent = 'Optional for Admin / Global Admin roles.';
              if (reqMark) reqMark.style.display = 'none';
            } else {
              teamSelect.setAttribute('required', 'required');
              if (hint) hint.textContent = 'Required for User role.';
              if (reqMark) reqMark.style.display = '';
            }
          }
        }
        document.getElementById('roleSelect').addEventListener('change', updateTeamSection);
        updateTeamSection();
      </script>

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">{{ action }} User</button>
        <a href="{{ url_for('auth.users') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
